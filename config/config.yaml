environment: development

server:
  port: 1100
  host: "0.0.0.0"
  read_timeout: "10s"
  write_timeout: "30s"
  max_header_bytes: 1048576

database:
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "30m"
  migration_path: ""

redis:
  url: "redis://localhost:6379"
  password: ""
  db: 0
  pool_size: 20

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"
  exchange: "moistello.events"
  queues:
    notifications: "moistello.notifications"
    webhooks: "moistello.webhooks"

stellar:
  network: "testnet"
  horizon_url: "https://horizon-testnet.stellar.org"
  soroban_rpc_url: "https://soroban-testnet.stellar.org"
  network_passphrase: "Test SDF Network ; September 2015"
  master_public_key: "GAX23V3WWDPPR5WRER3KTEUTDLSCGZYMSJY5FDRRKKCIQ4JADF5T27RC"
  master_secret_key: "SDDBM2MKQSV2ZPEDKTSI3IWNEUSJU5DAWW5NSRWNKJ4FABXSYGYW72FO"

auth:
  jwt_private_key_path: "./config/keys/jwt-private.pem"
  jwt_public_key_path: "./config/keys/jwt-public.pem"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"
  nonce_ttl: "5m"

indexer:
  poll_interval: "3s"
  batch_size: 50
  start_ledger: 0

notification:
  email:
    provider: ""
    api_key: ""
    from_address: ""
  sms:
    provider: ""
    account_sid: ""
    auth_token: ""
    from_number: ""
  push:
    fcm_server_key: ""

cors:
  allowed_origins:
    - "http://localhost:1110"
  allowed_methods:
    - "GET"
    - "POST"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"
  allow_credentials: true
  max_age: "24h"

rate_limit:
  global: 100
  authenticated: 300
  auth: 10

logging:
  level: "debug"
  format: "json"
  output: "stdout"

